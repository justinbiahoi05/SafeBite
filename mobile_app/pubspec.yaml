name: mobile_app
description: "A new Flutter project."
publish_to: 'none'

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  tflite_flutter:
    git:
      url: https://github.com/tensorflow/flutter-tflite.git
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_translation: ^0.13.0
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.0.7
  image: ^4.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_image/onboard.png
    - assets/app_image/getstart.png
    - assets/ai/safebite_model.tflite
    - assets/ai/vocab.json
    - assets/ai/labels.json
    - assets/ai/ingredients_db.json